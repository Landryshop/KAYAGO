version: "1.0"
services:
  app:
    build: .
    image: kayago-app:latest
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - DB_HOST=db
    depends_on:
      - db
  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=kayago
      - POSTGRES_PASSWORD=${DB_PASSWORD}
